<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="100%" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@500&amp;display=swap');
      .text-container {
        font-family: 'Fira Code', monospace;
        font-size: 32px;
        fill: #87CEEB;
        text-anchor: middle;
      }
      .text-bg { fill: #0D1117; }
      
      @keyframes showT1 {
        0%, 30% { opacity: 1; }
        31%, 100% { opacity: 0; }
      }
      @keyframes showT2 {
        0%, 33% { opacity: 0; }
        34%, 63% { opacity: 1; }
        64%, 100% { opacity: 0; }
      }
      @keyframes showT3 {
        0%, 66% { opacity: 0; }
        67%, 96% { opacity: 1; }
        97%, 100% { opacity: 0; }
      }
      @keyframes glitchAnim {
        0%, 96% { transform: translate(0,0); filter: none; }
        97% { transform: translate(-3px, 2px); filter: blur(1px); fill: #00BFFF; }
        98% { transform: translate(3px, -2px); filter: blur(2px); fill: #1E90FF; }
        99% { transform: translate(0, 0); filter: none; fill: #87CEEB; }
      }
      
      .t1 { animation: showT1 9s infinite, glitchAnim 3s infinite; }
      .t2 { animation: showT2 9s infinite, glitchAnim 3s infinite; }
      .t3 { animation: showT3 9s infinite, glitchAnim 3s infinite; }
      .cursor {
        animation: blink 1s step-end infinite;
        fill: #87CEEB;
      }
      @keyframes blink { 50% { opacity: 0; } }
    </style>
  </defs>

  <rect width="800" height="120" class="text-bg" rx="10" />
  
  <g class="text-container" transform="translate(400, 65)">
    <text class="t1">Hi I am Vivesh Kumar Singh<tspan class="cursor">_</tspan></text>
    <text class="t2">नमस्ते, मैं विवेश कुमार सिंह हूँ<tspan class="cursor">_</tspan></text>
    <text class="t3">Hola, soy Vivesh Kumar Singh<tspan class="cursor">_</tspan></text>
  </g>
</svg>
