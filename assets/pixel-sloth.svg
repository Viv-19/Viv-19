<svg width="100%" height="40" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes moveRight {
      0% { transform: translateX(-100px); }
      100% { transform: translateX(1000px); }
    }
    @keyframes swing {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }
    .sloth {
      animation: moveRight 35s linear infinite;
    }
    .body { fill: #8B5A2B; }
    .face { fill: #FFE5B4; }
    .eye { fill: #3E2723; }
    .vine { stroke: #556B2F; stroke-width: 2; stroke-dasharray: 10 5; }
  </style>
  
  <!-- Vine spanning across -->
  <line x1="0" y1="5" x2="100%" y2="5" class="vine" />
  
  <g class="sloth">
    <g style="transform-origin: 25px 5px; animation: swing 2.5s ease-in-out infinite;">
      <!-- Arms attached to vine -->
      <rect x="15" y="5" width="4" height="10" class="body"/>
      <rect x="35" y="5" width="4" height="10" class="body"/>
      
      <!-- Body -->
      <rect x="10" y="15" width="34" height="14" rx="4" class="body"/>
      
      <!-- Face -->
      <rect x="36" y="17" width="10" height="10" rx="3" class="face"/>
      
      <!-- Eyes/Mask -->
      <rect x="37" y="19" width="3" height="3" class="body"/>
      <rect x="42" y="19" width="3" height="3" class="body"/>
      <rect x="38" y="20" width="1" height="1" class="eye"/>
      <rect x="43" y="20" width="1" height="1" class="eye"/>
      
      <!-- Legs hanging -->
      <rect x="12" y="25" width="4" height="6" class="body"/>
      <rect x="20" y="25" width="4" height="6" class="body"/>
    </g>
  </g>
</svg>
