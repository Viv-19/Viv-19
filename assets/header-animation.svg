<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 320" width="850" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#12132a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="fur-main" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C4A265"/>
      <stop offset="100%" style="stop-color:#9a7d45"/>
    </linearGradient>
    <linearGradient id="fur-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6B5B3D"/>
      <stop offset="100%" style="stop-color:#4a3f2a"/>
    </linearGradient>
    <linearGradient id="desk-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a3e"/>
      <stop offset="100%" style="stop-color:#1e1e2e"/>
    </linearGradient>
    <linearGradient id="screen-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35"/>
      <stop offset="100%" style="stop-color:#0f1525"/>
    </linearGradient>
    <linearGradient id="mug-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5"/>
      <stop offset="100%" style="stop-color:#d4d4d4"/>
    </linearGradient>
    <linearGradient id="coffee-liquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5c3d1e"/>
      <stop offset="100%" style="stop-color:#3a2510"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#64ffda"/>
      <stop offset="50%" style="stop-color:#bb86fc"/>
      <stop offset="100%" style="stop-color:#ff79c6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <style>
    @keyframes steam { 0%{transform:translateY(0);opacity:0.7} 50%{transform:translateY(-12px);opacity:0.3} 100%{transform:translateY(-25px);opacity:0} }
    @keyframes blink { 0%,93%,100%{transform:scaleY(1)} 96%{transform:scaleY(0.05)} }
    @keyframes cursorBlink { 0%,50%{opacity:1} 51%,100%{opacity:0} }
    @keyframes float1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes float2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
    @keyframes pulse { 0%,100%{opacity:0.2} 50%{opacity:0.7} }
    @keyframes codeAppear { 0%{width:0;opacity:0} 15%{opacity:0.85} 85%{opacity:0.85} 100%{opacity:0} }
    @keyframes monitorGlow { 0%,100%{opacity:0.06} 50%{opacity:0.15} }
    @keyframes breathe { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.02)} }
    @keyframes keyTap { 0%,85%,100%{transform:translateY(0)} 90%{transform:translateY(1px)} }
    @keyframes waveHand { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(-3deg)} 75%{transform:rotate(3deg)} }
    .s1{animation:steam 2.8s ease-out infinite}
    .s2{animation:steam 2.8s ease-out 0.9s infinite}
    .s3{animation:steam 2.8s ease-out 1.8s infinite}
    .eye-anim{animation:blink 5s ease-in-out infinite;transform-origin:center}
    .cursor{animation:cursorBlink 1s step-end infinite}
    .fl1{animation:float1 4s ease-in-out infinite}
    .fl2{animation:float2 3.5s ease-in-out 0.7s infinite}
    .fl3{animation:float1 5s ease-in-out 1.4s infinite}
    .particle{animation:pulse 3s ease-in-out infinite}
    .code-ln{animation:codeAppear 5s ease-in-out infinite}
    .mglow{animation:monitorGlow 5s ease-in-out infinite}
    .body-breathe{animation:breathe 4s ease-in-out infinite;transform-origin:center bottom}
    .k1{animation:keyTap 0.8s ease infinite}
    .k2{animation:keyTap 0.8s ease 0.2s infinite}
    .k3{animation:keyTap 0.8s ease 0.4s infinite}
    .title-text{font-family:'Segoe UI',Helvetica,Arial,sans-serif;font-weight:800}
    .sub-text{font-family:'Segoe UI',Helvetica,Arial,sans-serif;font-weight:400}
  </style>

  <!-- Background -->
  <rect width="850" height="320" fill="url(#bg)" rx="10"/>

  <!-- Particles -->
  <circle cx="40" cy="25" r="1.2" fill="#64ffda" class="particle" opacity="0.3"/>
  <circle cx="120" cy="60" r="0.9" fill="#bb86fc" class="particle" style="animation-delay:0.5s" opacity="0.2"/>
  <circle cx="780" cy="40" r="1.1" fill="#ff79c6" class="particle" style="animation-delay:1s" opacity="0.25"/>
  <circle cx="700" cy="80" r="0.8" fill="#64ffda" class="particle" style="animation-delay:1.5s" opacity="0.3"/>
  <circle cx="60" cy="280" r="1" fill="#f1fa8c" class="particle" style="animation-delay:2s" opacity="0.2"/>
  <circle cx="810" cy="260" r="1.3" fill="#bb86fc" class="particle" style="animation-delay:0.8s" opacity="0.2"/>
  <circle cx="400" cy="20" r="0.7" fill="#50fa7b" class="particle" style="animation-delay:1.2s" opacity="0.25"/>
  <circle cx="250" cy="15" r="1" fill="#ff79c6" class="particle" style="animation-delay:0.3s" opacity="0.2"/>
  <circle cx="600" cy="30" r="0.9" fill="#8be9fd" class="particle" style="animation-delay:1.8s" opacity="0.2"/>

  <!-- Monitor ambient glow -->
  <ellipse cx="540" cy="170" rx="180" ry="110" fill="#64ffda" opacity="0.04" class="mglow"/>

  <!-- === DESK === -->
  <rect x="170" y="255" width="520" height="10" rx="3" fill="url(#desk-grad)" filter="url(#shadow)"/>
  <rect x="195" y="265" width="6" height="45" rx="2" fill="#22223a"/>
  <rect x="665" y="265" width="6" height="45" rx="2" fill="#22223a"/>
  <rect x="180" y="306" width="50" height="4" rx="2" fill="#1c1c30"/>
  <rect x="640" y="306" width="50" height="4" rx="2" fill="#1c1c30"/>

  <!-- === CHAIR === -->
  <rect x="210" y="175" width="80" height="82" rx="12" fill="#252540" filter="url(#soft-shadow)"/>
  <rect x="215" y="180" width="70" height="72" rx="9" fill="#2d2d4a"/>
  <rect x="200" y="250" width="100" height="12" rx="5" fill="#252540"/>
  <rect x="245" y="262" width="10" height="30" fill="#1e1e35"/>
  <ellipse cx="250" cy="296" rx="28" ry="4" fill="#1a1a30"/>

  <!-- === MONITOR === -->
  <rect x="430" y="100" width="220" height="145" rx="7" fill="#18182e" stroke="#333350" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="437" y="107" width="206" height="131" rx="4" fill="url(#screen-grad)"/>
  <!-- Monitor stand -->
  <rect x="528" y="245" width="14" height="12" fill="#22223a"/>
  <rect x="510" y="254" width="50" height="4" rx="2" fill="#22223a"/>

  <!-- Code on monitor -->
  <rect x="447" y="117" width="40" height="5" rx="2" fill="#bd93f9" class="code-ln" opacity="0.85"/>
  <rect x="492" y="117" width="55" height="5" rx="2" fill="#8be9fd" class="code-ln" style="animation-delay:0.4s" opacity="0.7"/>
  <rect x="555" y="117" width="30" height="5" rx="2" fill="#f8f8f2" class="code-ln" style="animation-delay:0.7s" opacity="0.5"/>
  <rect x="455" y="128" width="30" height="5" rx="2" fill="#50fa7b" class="code-ln" style="animation-delay:1s" opacity="0.8"/>
  <rect x="490" y="128" width="70" height="5" rx="2" fill="#f8f8f2" class="code-ln" style="animation-delay:1.3s" opacity="0.55"/>
  <rect x="455" y="139" width="50" height="5" rx="2" fill="#ff79c6" class="code-ln" style="animation-delay:1.6s" opacity="0.8"/>
  <rect x="510" y="139" width="35" height="5" rx="2" fill="#f1fa8c" class="code-ln" style="animation-delay:1.9s" opacity="0.65"/>
  <rect x="465" y="150" width="65" height="5" rx="2" fill="#8be9fd" class="code-ln" style="animation-delay:2.2s" opacity="0.7"/>
  <rect x="455" y="161" width="40" height="5" rx="2" fill="#50fa7b" class="code-ln" style="animation-delay:2.5s" opacity="0.8"/>
  <rect x="500" y="161" width="80" height="5" rx="2" fill="#f8f8f2" class="code-ln" style="animation-delay:2.8s" opacity="0.5"/>
  <rect x="455" y="172" width="25" height="5" rx="2" fill="#bd93f9" class="code-ln" style="animation-delay:3.1s" opacity="0.85"/>
  <rect x="485" y="172" width="45" height="5" rx="2" fill="#ff79c6" class="code-ln" style="animation-delay:3.4s" opacity="0.7"/>
  <rect x="465" y="183" width="55" height="5" rx="2" fill="#f1fa8c" class="code-ln" style="animation-delay:3.7s" opacity="0.65"/>
  <rect x="525" y="183" width="30" height="5" rx="2" fill="#8be9fd" class="code-ln" style="animation-delay:4s" opacity="0.6"/>
  <rect x="447" y="194" width="35" height="5" rx="2" fill="#50fa7b" class="code-ln" style="animation-delay:4.3s" opacity="0.8"/>
  <!-- Cursor -->
  <rect x="487" y="194" width="2" height="7" fill="#f8f8f2" class="cursor"/>

  <!-- Line numbers gutter -->
  <rect x="441" y="115" width="1" height="90" fill="#444470" opacity="0.4"/>

  <!-- === KEYBOARD === -->
  <rect x="430" y="237" width="120" height="16" rx="3" fill="#252540" filter="url(#soft-shadow)"/>
  <!-- Key rows -->
  <rect x="435" y="239" width="7" height="5" rx="1" fill="#333355" class="k1"/>
  <rect x="444" y="239" width="7" height="5" rx="1" fill="#333355" class="k2"/>
  <rect x="453" y="239" width="7" height="5" rx="1" fill="#333355" class="k3"/>
  <rect x="462" y="239" width="7" height="5" rx="1" fill="#333355" class="k1"/>
  <rect x="471" y="239" width="7" height="5" rx="1" fill="#333355" class="k2"/>
  <rect x="480" y="239" width="7" height="5" rx="1" fill="#333355"/>
  <rect x="489" y="239" width="7" height="5" rx="1" fill="#333355" class="k3"/>
  <rect x="498" y="239" width="7" height="5" rx="1" fill="#333355"/>
  <rect x="507" y="239" width="7" height="5" rx="1" fill="#333355" class="k1"/>
  <rect x="516" y="239" width="7" height="5" rx="1" fill="#333355"/>
  <rect x="525" y="239" width="7" height="5" rx="1" fill="#333355" class="k2"/>
  <rect x="534" y="239" width="7" height="5" rx="1" fill="#333355"/>
  <rect x="435" y="247" width="7" height="5" rx="1" fill="#333355"/>
  <rect x="444" y="247" width="7" height="5" rx="1" fill="#333355" class="k3"/>
  <rect x="453" y="247" width="7" height="5" rx="1" fill="#333355"/>
  <rect x="462" y="247" width="7" height="5" rx="1" fill="#333355" class="k1"/>
  <rect x="471" y="247" width="7" height="5" rx="1" fill="#333355"/>
  <rect x="480" y="247" width="25" height="5" rx="1" fill="#333355" class="k2"/>
  <rect x="507" y="247" width="7" height="5" rx="1" fill="#333355"/>
  <rect x="516" y="247" width="7" height="5" rx="1" fill="#333355" class="k3"/>
  <rect x="525" y="247" width="7" height="5" rx="1" fill="#333355"/>
  <rect x="534" y="247" width="7" height="5" rx="1" fill="#333355"/>

  <!-- === COFFEE MUG === -->
  <g transform="translate(385, 218)">
    <!-- Mug body -->
    <rect x="0" y="8" width="22" height="28" rx="3" fill="url(#mug-grad)" filter="url(#soft-shadow)"/>
    <!-- Mug handle -->
    <path d="M22,14 C30,14 30,30 22,30" fill="none" stroke="#d4d4d4" stroke-width="3"/>
    <!-- Coffee inside -->
    <rect x="2" y="10" width="18" height="8" rx="2" fill="url(#coffee-liquid)"/>
    <!-- Heart on mug -->
    <path d="M8,22 C8,19 11,18 11,21 C11,18 14,19 14,22 C14,25 11,28 11,28 C11,28 8,25 8,22Z" fill="#ff6b6b" opacity="0.7"/>
    <!-- Steam -->
    <path d="M5,6 Q7,0 5,-5" fill="none" stroke="#f8f8f2" stroke-width="1.2" opacity="0.5" class="s1" stroke-linecap="round"/>
    <path d="M11,5 Q13,-1 11,-6" fill="none" stroke="#f8f8f2" stroke-width="1" opacity="0.4" class="s2" stroke-linecap="round"/>
    <path d="M17,6 Q19,0 17,-5" fill="none" stroke="#f8f8f2" stroke-width="1.2" opacity="0.5" class="s3" stroke-linecap="round"/>
  </g>

  <!-- === SLOTH CHARACTER === -->
  <g class="body-breathe">
    <!-- Body / Hoodie -->
    <ellipse cx="260" cy="235" rx="42" ry="28" fill="#2d2d4a"/>
    <ellipse cx="260" cy="230" rx="38" ry="22" fill="#353560"/>
    <!-- Hood drawstrings -->
    <line x1="252" y1="215" x2="250" y2="225" stroke="#555580" stroke-width="1"/>
    <line x1="268" y1="215" x2="270" y2="225" stroke="#555580" stroke-width="1"/>

    <!-- Arms extending to keyboard -->
    <!-- Left arm -->
    <path d="M230,230 C280,250 360,248 430,245" fill="none" stroke="url(#fur-main)" stroke-width="12" stroke-linecap="round"/>
    <!-- Right arm -->
    <path d="M290,230 C340,250 400,248 440,248" fill="none" stroke="url(#fur-main)" stroke-width="12" stroke-linecap="round"/>
    <!-- Claws on left -->
    <line x1="428" y1="243" x2="432" y2="238" stroke="#d4c090" stroke-width="2" stroke-linecap="round"/>
    <line x1="430" y1="245" x2="436" y2="240" stroke="#d4c090" stroke-width="2" stroke-linecap="round"/>
    <line x1="432" y1="247" x2="440" y2="243" stroke="#d4c090" stroke-width="2" stroke-linecap="round"/>
    <!-- Claws on right -->
    <line x1="438" y1="246" x2="442" y2="241" stroke="#d4c090" stroke-width="2" stroke-linecap="round"/>
    <line x1="440" y1="248" x2="446" y2="243" stroke="#d4c090" stroke-width="2" stroke-linecap="round"/>
    <line x1="442" y1="250" x2="450" y2="246" stroke="#d4c090" stroke-width="2" stroke-linecap="round"/>

    <!-- HEAD -->
    <g>
      <!-- Main head shape -->
      <ellipse cx="260" cy="175" rx="45" ry="40" fill="url(#fur-main)" filter="url(#soft-shadow)"/>
      <!-- Face lighter patch -->
      <ellipse cx="260" cy="182" rx="32" ry="28" fill="#d4b87a"/>
      <!-- Eye patches (dark - characteristic sloth feature) -->
      <ellipse cx="244" cy="172" rx="14" ry="11" fill="url(#fur-dark)"/>
      <ellipse cx="276" cy="172" rx="14" ry="11" fill="url(#fur-dark)"/>

      <!-- Eyes with blink -->
      <g class="eye-anim">
        <ellipse cx="244" cy="172" rx="7" ry="7" fill="white"/>
        <ellipse cx="276" cy="172" rx="7" ry="7" fill="white"/>
        <circle cx="246" cy="171" r="4" fill="#1a1a2e"/>
        <circle cx="278" cy="171" r="4" fill="#1a1a2e"/>
        <!-- Eye highlights -->
        <circle cx="248" cy="169" r="1.5" fill="white"/>
        <circle cx="280" cy="169" r="1.5" fill="white"/>
      </g>

      <!-- Glasses -->
      <rect x="230" y="162" width="28" height="20" rx="6" fill="none" stroke="#333" stroke-width="2.2"/>
      <rect x="262" y="162" width="28" height="20" rx="6" fill="none" stroke="#333" stroke-width="2.2"/>
      <line x1="258" y1="172" x2="262" y2="172" stroke="#333" stroke-width="2"/>
      <!-- Glasses arms -->
      <line x1="230" y1="168" x2="218" y2="165" stroke="#333" stroke-width="2" stroke-linecap="round"/>
      <line x1="290" y1="168" x2="302" y2="165" stroke="#333" stroke-width="2" stroke-linecap="round"/>

      <!-- Nose -->
      <ellipse cx="260" cy="186" rx="5" ry="3.5" fill="#5c4a32"/>

      <!-- Mouth - gentle smile -->
      <path d="M252,194 Q260,200 268,194" fill="none" stroke="#6b5a3e" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Ears -->
      <circle cx="220" cy="158" r="8" fill="url(#fur-main)"/>
      <circle cx="220" cy="158" r="5" fill="#d4b87a"/>
      <circle cx="300" cy="158" r="8" fill="url(#fur-main)"/>
      <circle cx="300" cy="158" r="5" fill="#d4b87a"/>
    </g>
  </g>

  <!-- === FLOATING TECH SYMBOLS === -->
  <g class="fl1">
    <text x="100" y="90" font-family="monospace" font-size="14" fill="#64ffda" opacity="0.5">&lt;/&gt;</text>
  </g>
  <g class="fl2">
    <text x="750" y="120" font-family="monospace" font-size="12" fill="#bb86fc" opacity="0.45">{ }</text>
  </g>
  <g class="fl3">
    <text x="140" y="200" font-family="monospace" font-size="11" fill="#ff79c6" opacity="0.4">def</text>
  </g>
  <g class="fl1" style="animation-delay:2s">
    <text x="720" y="200" font-family="monospace" font-size="13" fill="#50fa7b" opacity="0.45">AI</text>
  </g>
  <g class="fl2" style="animation-delay:0.5s">
    <text x="80" y="150" font-family="monospace" font-size="10" fill="#f1fa8c" opacity="0.35">py</text>
  </g>
  <g class="fl3" style="animation-delay:1s">
    <text x="770" y="270" font-family="monospace" font-size="11" fill="#8be9fd" opacity="0.4">☕</text>
  </g>

  <!-- Small coffee beans floating -->
  <g class="fl2" style="animation-delay:0.3s">
    <ellipse cx="130" cy="260" rx="4" ry="6" fill="#5c3d1e" opacity="0.3" transform="rotate(-20,130,260)"/>
  </g>
  <g class="fl1" style="animation-delay:1.5s">
    <ellipse cx="740" cy="160" rx="3" ry="5" fill="#5c3d1e" opacity="0.25" transform="rotate(15,740,160)"/>
  </g>

  <!-- === TITLE TEXT === -->
  <text x="425" y="38" text-anchor="middle" class="title-text" font-size="22" fill="url(#title-grad)" filter="url(#glow)">VIVESH KUMAR SINGH</text>
  <text x="425" y="60" text-anchor="middle" class="sub-text" font-size="12" fill="#a0a0c0" letter-spacing="3">AI / GENAI DEVELOPER  •  RESEARCHER  •  COFFEE ADDICT</text>

  <!-- Decorative line under title -->
  <line x1="280" y1="70" x2="570" y2="70" stroke="url(#title-grad)" stroke-width="1" opacity="0.4"/>

  <!-- Bottom tagline -->
  <text x="425" y="308" text-anchor="middle" class="sub-text" font-size="10" fill="#555575" letter-spacing="2">POWERED BY CAFFEINE &amp; CURIOSITY 🦥</text>
</svg>
