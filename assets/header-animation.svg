<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="350">
  <defs>
    <linearGradient id="peach-overlay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFDAB9; stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#FFCBA4; stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#1a1110; stop-opacity:0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes floatUp {
      0% { transform: translateY(0px) scale(1); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.8; }
      100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.8; filter: brightness(1); }
      50% { opacity: 1; filter: brightness(1.2); }
    }
    @keyframes drift {
      0% { transform: translateX(0px); }
      50% { transform: translateX(10px); }
      100% { transform: translateX(0px); }
    }
    .particle {
      animation: floatUp 6s infinite linear, drift 4s infinite ease-in-out;
      fill: #FFE5B4;
    }
    .title {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-weight: 800;
      font-size: 42px;
      fill: #FFE5B4;
      letter-spacing: 5px;
      animation: pulseGlow 4s ease-in-out infinite;
    }
    .subtitle {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-weight: 400;
      font-size: 16px;
      fill: #FFDAB9;
      letter-spacing: 8px;
      opacity: 0.95;
    }
  </style>

  <!-- Embed the realistic AI Sloth Image -->
  <image href="https://raw.githubusercontent.com/Viv-19/Viv-19/main/assets/sloth-hero.png" 
         x="0" y="0" width="850" height="350" preserveAspectRatio="xMidYMid slice" />

  <!-- Peach / Dark overlay for text readability and theme -->
  <rect x="0" y="0" width="850" height="350" fill="url(#peach-overlay)"/>
  
  <!-- Left to right dark gradient -->
  <rect x="0" y="0" width="850" height="350" fill="#2a1a15" opacity="0.3"/>
  <rect x="0" y="200" width="850" height="150" fill="url(#peach-overlay)" opacity="0.4"/>

  <!-- Particles -->
  <circle cx="150" cy="350" r="2.5" class="particle" style="animation-duration: 7s; animation-delay: 0s;"/>
  <circle cx="250" cy="350" r="3.5" class="particle" style="animation-duration: 9s; animation-delay: 2s;"/>
  <circle cx="450" cy="350" r="1.5" class="particle" style="animation-duration: 6s; animation-delay: 4s;"/>
  <circle cx="650" cy="350" r="4" class="particle" style="animation-duration: 8s; animation-delay: 1s;"/>
  <circle cx="750" cy="350" r="2" class="particle" style="animation-duration: 7.5s; animation-delay: 5s;"/>
  <circle cx="350" cy="350" r="1" class="particle" style="animation-duration: 8.5s; animation-delay: 3s;"/>
  <circle cx="550" cy="350" r="3" class="particle" style="animation-duration: 6.5s; animation-delay: 6s;"/>

  <!-- Text -->
  <g transform="translate(425, 280)" text-anchor="middle">
    <text x="0" y="0" class="title" filter="url(#glow)">VIVESH KUMAR SINGH</text>
    <text x="0" y="35" class="subtitle">AI &amp; GENAI DEVELOPER</text>
  </g>
</svg>
